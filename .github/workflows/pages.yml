name: Deploy GitHub Pages on Tag

on:
  push:
    tags:
      - '*'
  create:
    ref_type: tag
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web_control_react

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web_control_react/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'web_control_react/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
